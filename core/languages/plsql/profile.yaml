name: plsql
file_extensions: [".sql", ".pks", ".pkb", ".plsql", ".prc", ".fnc", ".trg", ".vw"]

grammar:
  # Regex-based extractor — no PL/SQL AST library in the dep set is worth
  # pulling in for v1. Extracts packages, procedures, functions, triggers,
  # cross-procedure calls, and embedded SQL (SELECT/INSERT/UPDATE/DELETE/
  # MERGE/CALL). Identifiers are normalized to lowercase.
  kind: native
  driver: core.languages.plsql.grammar.PlSqlGrammar

module_resolution:
  separator: "."
  candidate_path_templates:
    - "{module}.pks"
    - "{module}.pkb"
    - "{module}.sql"

package_aggregator:
  # The package spec file (`.pks`) is the public contract; the body (`.pkb`)
  # implements it. Anything declared in a spec is reachable from outside.
  files: ["*.pks"]

visibility:
  rule: plsql_declared_in_spec

test_paths:
  glob_patterns:
    - "**/utplsql/**"
    - "**/test_*.sql"
    - "**/*_test.sql"

notes: |
  Native regex grammar. Case-insensitive (all emitted names are
  lowercased). Cross-package calls and embedded SQL are extracted at
  fact-emission time; semantic resolution (which procedure does a
  qualified callee resolve to?) is done by OracleCallResolver.
