name: java
language: java
detectors:
  - any_file_glob: ["*.java", "**/*.java"]

# Language-level test paths (src/test/java, *Test.java naming) live in
# `core/languages/java/profile.yaml`. JUnit annotations and Mockito
# patterns stay here because they're framework-specific.

tests:
  decorator_callees:
    - "Test"
    - "ParameterizedTest"
    - "RepeatedTest"
    - "TestFactory"
    - "TestTemplate"
mocks:
  field_annotations:
    - "Mock"
    - "MockBean"
    - "Spy"
    - "InjectMocks"
  mock_call_signatures: ["mock"]
http_clients:
  external_modules:
    - java.net.http
    - java.sql
    - javax.sql
    - javax.persistence
    - jakarta.persistence
    - okhttp3
    - retrofit2
    - com.squareup.okhttp
    - org.apache.http
    - org.apache.hc
    - org.springframework.web.client
    - org.springframework.web.reactive.function.client
    - org.springframework.jdbc
    - org.springframework.kafka
    - org.springframework.amqp
    - org.springframework.data.redis
    - redis.clients
    - org.apache.kafka
    - software.amazon.awssdk
    - com.amazonaws
    - io.grpc
    - com.mongodb
    - org.neo4j.driver
notes: |
  Java framework knowledge spanning JUnit 4/5 and Mockito. Test-path
  conventions and `.java` resolution come from core/languages/java/profile.yaml.
